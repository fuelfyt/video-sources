<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sources - Historical & Geopolitical Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <style>
        body { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 2rem; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        header { 
            text-align: center; 
            margin-bottom: 3rem; 
            border-bottom: 1px solid #444; 
            padding-bottom: 2rem;
        }
        .logo { 
            max-height: 80px; 
            margin-bottom: 1rem;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .video-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .video-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            color: #fff;
        }
        .sources-link {
            display: inline-block;
            background: #0066cc;
            color: white;
            padding: 0.5rem 1rem;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .sources-link:hover {
            background: #0052a3;
        }
        .stats {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 1rem;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            color: #888;
            border-top: 1px solid #444;
        }
    </style>
</head>
<body>
    <header>
        <a href="/">
            <img src="assets/fuel2.png" alt="Channel Logo" class="logo">
        </a>
        <h1>Sources & References</h1>
        <input type="text" id="search" placeholder="Search videos..." style="width:100%; padding:0.75rem; margin:1rem 0; border-radius:6px; border:1px solid #444;">
<script>
document.getElementById('search').addEventListener('input', function(e) {
    document.querySelectorAll('.video-card').forEach(card => {
        card.style.display = card.textContent.toLowerCase().includes(e.target.value.toLowerCase()) ? 'block' : 'none';
    });
});
</script>

        <p>Full citations for my videos</p>
    </header>

    <main>
        <div class="video-grid">
            <div class="video-card">
                <img src="assets/thumbnails/korea-thumb.jpg" alt="Korea thumbnail" class="thumbnail">
                <h2 class="video-title">The Secret Society That Overthrew Korea's President</h2>
                <p>October 26, 1979: Park Chung-hee's assassination and the Hanahoe coup</p>
                <a href="sources/2026-03-the-secret-society-that-overthrew-koreas-president.md" class="sources-link">
                    📚 View Sources
                </a>
                <div class="stats">
                    Published Mar 1, 2026 • 18 min
                </div>
            </div>

            
            <!-- Add more video cards here as you publish -->
        </div>
    </main>

    <footer>
        <p>© 2026 fuel | <a href="fuelfyt@proton.me">Contact</a> | 
        <a href="https://youtube.com/@fuelforyourthoughts">YouTube</a></p>
    </footer>
</body>
</html>
